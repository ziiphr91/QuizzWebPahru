<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulangan</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-bg"></div>

    <div class="auth-container" id="auth-container">

        <div class="auth-box">

            <h2 id="auth-title">Login</h2>

            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button id="auth-btn">Login</button>

            <p id="toggle-auth">
                Belum punya akun?
                <span id="toggle-text">Daftar</span>
            </p>

        </div>

    </div>

    <div class="container" id="quiz-container" style="display:none;">

        <header>

            <div class="header-top">
                <div id="timer">30:00</div>
                <h1>Soal Ulangan</h1>
            </div>

            <div class="user-info">
                <span id="user-display"></span>
                <button id="logout-btn">Logout</button>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>

            <p id="question-number">Soal 1 dari 20</p>

        </header>

        <main id="quiz-body">
            <h2 id="question-text">Memuat pertanyaan...</h2>

            <div class="options" id="options-container"></div>
        </main>

        <footer id="quiz-footer">
            <button id="next-btn" disabled>Pertanyaan Selanjutnya</button>
        </footer>

        <div class="question-list" id="question-list"></div>

        <div class="history-box">

            <div class="history-header">
                <h3>Riwayat Ujian</h3>
            </div>

            <div id="history-list"></div>
        </div>

    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2>Hasil Ujian Anda</h2>

            <div class="stats-grid">
                <div class="stat-card correct">
                    <span class="label">Benar</span>
                    <span id="correct-count">0</span>
                </div>

                <div class="stat-card wrong">
                    <span class="label">Salah</span>
                    <span id="wrong-count">0</span>
                </div>
            </div>

            <button onclick="closeResultModal()">Tutup</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
